name: CI

on:
    pull_request:
        types: [opened, synchronize, reopened]
    workflow_dispatch:

jobs:
    debug-workflow-run:
        runs-on: ubuntu-latest
        steps:
            - name: Debug workflow_run
              run: |
                  echo "event: ${{ github.event_name }}"
                  echo "actor: ${{ github.actor }}"
                  echo "triggering actor: ${{ github.triggering_actor }}"
                  echo "author association: ${{ github.event.pull_request.author_association }}"
                  echo "user: ${{ github.event.pull_request.user }}"
                  echo "pull_request: ${{ toJson(github.event.pull_request) }}"
    ci:
        if: >-
            github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
        uses: mydx-dev/common-workflow/.github/workflows/ci.yml@v1
        secrets: inherit
